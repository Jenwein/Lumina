[project]
name = "lumina-server"
version = "0.1.0"
description = "Lumina AI Desktop Pet Agent — Python Backend"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "websockets>=14.0",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "httpx>=0.28",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
vision = [
    "mss>=9.0",
    "Pillow>=11.0",
    "paddleocr>=2.9",
    "paddlepaddle>=3.0",
]
tools = [
    "pyautogui>=0.9",
    "psutil>=6.0",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.25",
    "pytest-cov>=6.0",
    "ruff>=0.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lumina"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py311"
line-length = 100
